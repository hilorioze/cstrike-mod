version: 2

updates:
  - package-ecosystem: github-actions

    directory: /

    schedule:
      interval: cron
      # Run weekly on Mondays at 00:00 UTC
      cronjob: '0 0 * * 1'

    assignees:
      - hilorioze

    labels:
      - dependencies
      - github_actions
      - automated

    commit-message:
      prefix: chore
      include: scope
