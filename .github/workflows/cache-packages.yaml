on:
  push:
    branches:
      - main

    paths: &paths
      - '.github/workflows/cache-packages.yaml'

      - 'src/**/*.c'
      - 'src/**/*.h'
      - 'CMakeLists.txt'

      - '**/*.nix'
      - '!devenv.nix'
      - 'flake.lock'

  pull_request:
    paths: *paths

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

  cancel-in-progress: false

jobs:
  collect-targets:
    runs-on: ubuntu-latest

    outputs:
      targets: ${{ steps.collect-targets.outputs.targets }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1
        with:
          extra_nix_config: &extra_nix_config |
            accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - id: collect-targets
        run: |
          echo "targets=$(jq -cn \
            --argjson systems "$(nix eval .#packages --apply builtins.attrNames --json)" \
            '{
              include: ($systems | map({target: "packages.\(.).default"}))
            }')" >> $GITHUB_OUTPUT

  build-targets:
    needs: collect-targets

    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJSON(needs.collect-targets.outputs.targets) }}

      fail-fast: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1
        with:
          extra_nix_config: *extra_nix_config

      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: hilorioze

          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

          skipPush: ${{ github.event_name == 'pull_request' }}

      - run: nix build .#${{ matrix.target }} -L
