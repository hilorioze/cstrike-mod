on:
  push:
    branches:
      - main

    paths: &paths
      - '.github/workflows/cache-devenv.yaml'

      - 'devenv.nix'
      - 'devenv.yaml'
      - 'devenv.lock'

  pull_request:
    paths: *paths

  workflow_dispatch:

concurrency:
  # one run per branch; latest completes last
  group: ${{ github.workflow }}-${{ github.ref }}

  cancel-in-progress: false

jobs:
  build-devenv:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1
        with:
          extra_nix_config: &extra_nix_config |
            accept-flake-config = true

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: devenv-${{ hashFiles('devenv.nix', 'devenv.yaml', 'devenv.lock') }}

          restore-prefixes-first-match: devenv-

      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: hilorioze

          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

          skipPush: ${{ github.event_name == 'pull_request' }}

      - run: nix profile install nixpkgs#devenv

      - run: devenv build
